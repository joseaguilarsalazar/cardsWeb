services:
  db:
    image: postgres:16-alpine
    container_name: diary_db
    restart: always
    environment:
      POSTGRES_DB: diary_production_db
      POSTGRES_USER: jose_admin
      POSTGRES_PASSWORD: TuContraseñaSuperSeguraDeBaseDeDatos
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jose_admin -d diary_production_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - diary_internal # 🔒 La DB solo habla con el entorno interno del diario

  web:
    build: .
    container_name: diary_web
    restart: always
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      - DB_HOST=db
      - DB_NAME=diary_production_db
      - DB_USER=jose_admin
      - DB_PASSWORD=TuContraseñaSuperSeguraDeBaseDeDatos
    volumes:
      - /var/www/diario_static:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy
    networks:
      - diary_internal # 🔒 Conecta con la base de datos de forma aislada
      - artdance_network # 🌐 Conecta con el contenedor maestro de Caddy

volumes:
  postgres_data:

# 🌟 LA SOLUCIÓN: Definición global de las redes al mismo nivel que 'services'
networks:
  diary_internal: # <-- Creación de la red interna que le faltaba a tu archivo
  artdance_network:
    external: true # <-- Le indica a Docker que esta red ya existe en el VPS