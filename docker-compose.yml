services:
  db:
    image: postgres:16-alpine
    container_name: diary_db
    restart: always
    env_file:
      - .env
    environment:
      # 🌟 Se acopla dinámicamente a las variables de tu archivo .env
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      # 🌟 Corregido para usar las variables internas del contenedor de forma dinámica
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - diary_internal # 🔒 La DB solo habla con el entorno interno del diario

  web:
    build: .
    container_name: diary_web
    restart: always
    ports:
      - "8001:8001"
    env_file:
      - .env
    volumes:
      - /var/www/diario_static:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy
    networks:
      - diary_internal # 🔒 Conecta con la base de datos de forma aislada
      - artdance_network # 🌐 Conecta con el contenedor maestro de Caddy

volumes:
  postgres_data:

# Definición global de las redes externas e internas
networks:
  diary_internal: 
  artdance_network:
    external: true # 🌐 Indica que pertenece al puente global compartido del VPS